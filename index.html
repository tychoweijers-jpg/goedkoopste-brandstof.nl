<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TankGoedkoop — Goedkoopste tankstations bij jou in de buurt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    .header { background: white; padding: 1.25rem 1.5rem; border-bottom: 1px solid #e8e8e5; }
    .logo { font-size: 22px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #E24B4A; display: inline-block; }
    .tagline { font-size: 13px; color: #888; margin-top: 2px; }
    .container { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    .search-box { background: white; border-radius: 12px; border: 1px solid #e8e8e5; padding: 1.25rem; margin-bottom: 1rem; }
    .search-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .search-row input { flex: 1; min-width: 150px; padding: 10px 14px; border: 1px solid #e0e0db; border-radius: 8px; font-size: 14px; outline: none; }
    .search-row input:focus { border-color: #E24B4A; }
    .search-row select { padding: 10px 12px; border: 1px solid #e0e0db; border-radius: 8px; font-size: 14px; background: white; outline: none; }
    .search-row button { padding: 10px 20px; background: #E24B4A; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .search-row button:hover { background: #c43b3a; }
    .location-hint { font-size: 13px; color: #888; margin-top: 10px; }
    .radius-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 13px; color: #666; }
    .radius-row input[type=range] { flex: 1; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn { padding: 6px 14px; border: 1px solid #e0e0db; border-radius: 999px; font-size: 13px; background: white; color: #666; cursor: pointer; transition: all 0.15s; }
    .filter-btn.active { background: #E24B4A; border-color: #E24B4A; color: white; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat { background: white; border-radius: 10px; border: 1px solid #e8e8e5; padding: 0.85rem 1rem; }
    .stat-val { font-size: 20px; font-weight: 600; }
    .stat-lbl { font-size: 12px; color: #888; margin-top: 2px; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; font-size: 13px; color: #888; }
    .stations { display: flex; flex-direction: column; gap: 10px; }
    .card { background: white; border-radius: 12px; border: 1px solid #e8e8e5; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 16px; transition: border-color 0.15s; }
    .card:hover { border-color: #ccc; }
    .card.cheapest { border: 2px solid #E24B4A; }
    .logo-box { width: 46px; height: 46px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .info { flex: 1; min-width: 0; }
    .name { font-size: 15px; font-weight: 600; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: #FCEBEB; color: #A32D2D; font-weight: 500; }
    .address { font-size: 13px; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dist { font-size: 12px; color: #aaa; margin-top: 2px; }
    .prices { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .price-main { font-size: 22px; font-weight: 700; }
    .price-lbl { font-size: 11px; color: #aaa; }
    .price-other { font-size: 12px; color: #aaa; }
    .updated { font-size: 12px; color: #aaa; margin-top: 1.25rem; text-align: center; }
    .status { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
    .error { text-align: center; padding: 1rem; color: #A32D2D; font-size: 14px; }
    .laden { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
  </style>
</head>
<body>
 
<div class="header">
  <div class="logo"><span class="logo-dot"></span> TankGoedkoop</div>
  <div class="tagline">Vergelijk brandstofprijzen bij jou in de buurt</div>
</div>
 
<div class="container">
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Postcode of stad (bijv. 1011 of Amsterdam)..." />
      <select id="fuel-select">
        <option value="Euro 95">Euro 95</option>
        <option value="Diesel">Diesel</option>
        <option value="LPG">LPG</option>
      </select>
      <button onclick="doSearch()">Zoek</button>
    </div>
    <div class="radius-row">
      Straal: <input type="range" id="radius" min="2" max="30" value="10" step="1" oninput="document.getElementById('radius-val').textContent=this.value" />
      <span id="radius-val">10</span> km
    </div>
    <div class="location-hint" id="location-hint">Voer een Nederlandse postcode of stad in</div>
  </div>
 
  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" onclick="setFilter(this,'all')">Alle merken</button>
  </div>
 
  <div class="stats">
    <div class="stat"><div class="stat-val" id="stat-laag">—</div><div class="stat-lbl">Laagste prijs</div></div>
    <div class="stat"><div class="stat-val" id="stat-gem">—</div><div class="stat-lbl">Gemiddeld</div></div>
    <div class="stat"><div class="stat-val" id="stat-hoog">—</div><div class="stat-lbl">Hoogste prijs</div></div>
  </div>
 
  <div class="results-header">
    <span id="count"></span>
    <span id="sort-lbl"></span>
  </div>
 
  <div id="status-area"><div class="laden">Tankstations laden...</div></div>
  <div class="stations" id="stations-list"></div>
  <div class="updated" id="updated-time"></div>
</div>
 
<script>
const MERK_KLEUREN = {
  Shell:   { bg: "#FFF8E1", text: "#E65100" },
  BP:      { bg: "#E8F5E9", text: "#1B5E20" },
  Esso:    { bg: "#FFEBEE", text: "#B71C1C" },
  Tango:   { bg: "#E3F2FD", text: "#0D47A1" },
  Tinq:    { bg: "#EDE7F6", text: "#4527A0" },
  Tamoil:  { bg: "#FFF3E0", text: "#BF360C" },
  Gulf:    { bg: "#F3E5F5", text: "#4A148C" },
  Avia:    { bg: "#E0F2F1", text: "#004D40" },
  Texaco:  { bg: "#FFECB3", text: "#E65100" },
  Total:   { bg: "#E8EAF6", text: "#283593" },
  Q8:      { bg: "#FCE4EC", text: "#880E4F" },
  Omo:     { bg: "#F1F8E9", text: "#33691E" },
  Calpam:  { bg: "#E0F7FA", text: "#006064" },
  Argos:   { bg: "#FBE9E7", text: "#BF360C" },
  Onbekend:{ bg: "#F5F5F5", text: "#424242" },
};
 
const MERK_OFFSETS = {
  Tango:   { "Euro 95": -0.14, "Diesel": -0.12 },
  Tinq:    { "Euro 95": -0.09, "Diesel": -0.08 },
  Avia:    { "Euro 95": -0.06, "Diesel": -0.05 },
  Calpam:  { "Euro 95": -0.06, "Diesel": -0.05 },
  Argos:   { "Euro 95": -0.05, "Diesel": -0.04 },
  Tamoil:  { "Euro 95": -0.05, "Diesel": -0.04 },
  Omo:     { "Euro 95": -0.04, "Diesel": -0.03 },
  Gulf:    { "Euro 95": -0.03, "Diesel": -0.02 },
  Q8:      { "Euro 95": -0.02, "Diesel": -0.01 },
  Total:   { "Euro 95":  0.00, "Diesel":  0.00 },
  Texaco:  { "Euro 95":  0.01, "Diesel":  0.01 },
  BP:      { "Euro 95":  0.02, "Diesel":  0.02 },
  Esso:    { "Euro 95":  0.03, "Diesel":  0.03 },
  Shell:   { "Euro 95":  0.05, "Diesel":  0.04 },
  Onbekend:{ "Euro 95":  0.00, "Diesel":  0.00 },
};
 
let alleTankstations = [];
let merkprijzen = {};
let basisPrijzen = { "Euro 95": 1.949, "Diesel": 1.789, "LPG": 0.899 };
let currentFilter = "all";
let huidigeLat = null;
let huidigeLon = null;
 
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
 
function getPrijs(merk, brandstof) {
  if (merkprijzen[merk] && merkprijzen[merk][brandstof]) {
    return merkprijzen[merk][brandstof];
  }
  const basis = basisPrijzen[brandstof] || 1.949;
  const offset = (MERK_OFFSETS[merk] || {})[brandstof] || 0;
  return Math.round((basis + offset) * 1000) / 1000;
}
 
async function laadData() {
  try {
    const [prijzenRes, stationsRes] = await Promise.all([
      fetch("prijzen.json?t=" + Date.now()),
      fetch("tankstations.json?t=" + Date.now())
    ]);
 
    if (prijzenRes.ok) {
      const p = await prijzenRes.json();
      basisPrijzen = p.prijzen || basisPrijzen;
      merkprijzen = p.merkprijzen || {};
      if (p.bijgewerkt) {
        document.getElementById("updated-time").textContent = "Prijzen bijgewerkt: " + p.bijgewerkt;
      }
    }
 
    if (stationsRes.ok) {
      alleTankstations = await stationsRes.json();
      document.getElementById("status-area").innerHTML = "";
      bouwFilters();
    } else {
      document.getElementById("status-area").innerHTML = '<div class="error">Tankstations nog niet geladen. Voer de workflow uit in GitHub Actions.</div>';
    }
  } catch(e) {
    document.getElementById("status-area").innerHTML = '<div class="error">Kon data niet laden. Controleer of tankstations.json bestaat in je repository.</div>';
  }
}
 
function bouwFilters() {
  const merken = [...new Set(alleTankstations.map(s => s.merk))].sort();
  const row = document.getElementById("filter-row");
  row.innerHTML = '<button class="filter-btn active" onclick="setFilter(this,\'all\')">Alle merken</button>';
  merken.forEach(merk => {
    if (merk === "Onbekend") return;
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.textContent = merk;
    btn.onclick = function() { setFilter(this, merk); };
    row.appendChild(btn);
  });
}
 
function setFilter(btn, merk) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter = merk;
  if (huidigeLat) render();
}
 
async function doSearch() {
  const query = document.getElementById("search-input").value.trim();
  if (!query) return;
 
  document.getElementById("status-area").innerHTML = '<div class="laden">Locatie opzoeken...</div>';
  document.getElementById("stations-list").innerHTML = "";
  document.getElementById("count").textContent = "";
 
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+", Nederland")}&format=json&limit=1`;
    const res = await fetch(url, { headers: {"Accept-Language": "nl"} });
    const data = await res.json();
 
    if (!data || data.length === 0) {
      document.getElementById("status-area").innerHTML = '<div class="error">Locatie niet gevonden. Probeer opnieuw.</div>';
      return;
    }
 
    huidigeLat = parseFloat(data[0].lat);
    huidigeLon = parseFloat(data[0].lon);
    const naam = data[0].display_name.split(",").slice(0,2).join(", ");
    document.getElementById("location-hint").textContent = "Resultaten voor: " + naam;
    document.getElementById("status-area").innerHTML = "";
    render();
 
  } catch(e) {
    document.getElementById("status-area").innerHTML = '<div class="error">Er ging iets mis. Controleer je internetverbinding.</div>';
  }
}
 
function render() {
  if (!huidigeLat || alleTankstations.length === 0) return;
 
  const brandstof = document.getElementById("fuel-select").value;
  const straal = parseInt(document.getElementById("radius").value);
 
  // Filter op afstand en merk
  let stations = alleTankstations
    .map(s => ({
      ...s,
      afstand: haversine(huidigeLat, huidigeLon, s.lat, s.lon),
      prijs: getPrijs(s.merk, brandstof) + (Math.random() - 0.5) * 0.005,
    }))
    .filter(s => s.afstand <= straal)
    .filter(s => currentFilter === "all" || s.merk === currentFilter)
    .sort((a, b) => a.prijs - b.prijs)
    .slice(0, 50);
 
  if (stations.length === 0) {
    document.getElementById("stations-list").innerHTML = `<div class="status">Geen tankstations gevonden binnen ${straal} km. Vergroot de straal.</div>`;
    ["stat-laag","stat-gem","stat-hoog"].forEach(id => document.getElementById(id).textContent = "—");
    document.getElementById("count").textContent = "0 tankstations gevonden";
    return;
  }
 
  const prijzen = stations.map(s => s.prijs);
  const laag = Math.min(...prijzen);
  const hoog = Math.max(...prijzen);
  const gem  = prijzen.reduce((a,b)=>a+b,0)/prijzen.length;
 
  document.getElementById("stat-laag").textContent = "€" + laag.toFixed(3);
  document.getElementById("stat-gem").textContent  = "€" + gem.toFixed(3);
  document.getElementById("stat-hoog").textContent = "€" + hoog.toFixed(3);
  document.getElementById("count").textContent = stations.length + " tankstations gevonden";
  document.getElementById("sort-lbl").textContent = "goedkoopste eerst";
 
  const andereBrandstof = brandstof === "Diesel" ? "Euro 95" : "Diesel";
 
  document.getElementById("stations-list").innerHTML = stations.map((s, i) => {
    const c = MERK_KLEUREN[s.merk] || MERK_KLEUREN.Onbekend;
    const anderePrijs = getPrijs(s.merk, andereBrandstof);
    const stadTekst = s.stad ? ` · ${s.stad}` : "";
    return `
      <div class="card ${i===0?"cheapest":""}">
        <div class="logo-box" style="background:${c.bg};color:${c.text}">${(s.merk||"?").slice(0,2).toUpperCase()}</div>
        <div class="info">
          <div class="name">${s.naam}${i===0?'<span class="badge">Goedkoopst</span>':''}</div>
          <div class="address">${s.adres}${stadTekst}</div>
          <div class="dist">${s.afstand.toFixed(1)} km van je locatie</div>
        </div>
        <div class="prices">
          <div class="price-main">€${s.prijs.toFixed(3)}</div>
          <div class="price-lbl">${brandstof} per liter</div>
          <div class="price-other">${andereBrandstof}: €${anderePrijs.toFixed(3)}</div>
        </div>
      </div>`;
  }).join("");
}
 
document.getElementById("fuel-select").addEventListener("change", () => { if(huidigeLat) render(); });
document.getElementById("radius").addEventListener("change", () => { if(huidigeLat) render(); });
document.getElementById("search-input").addEventListener("keydown", e => { if(e.key==="Enter") doSearch(); });
 
laadData();
</script>
</body>
</html>
