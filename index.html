<input id="pc" placeholder="1012AB">
<button onclick="zoek()">Zoek goedkoopste</button>

<div id="result"></div>

<script>
async function zoek() {
  const resultDiv = document.getElementById("result");
  const pc = document.getElementById("pc").value.trim();

  if (!pc) {
    resultDiv.innerHTML = "Voer eerst een postcode in";
    return;
  }

  try {
    // Fetch JSON vanaf root (zelfde folder als index.html)
    const res = await fetch("./prijzen.json");
    console.log("Fetch status:", res.status);

    if (!res.ok) {
      resultDiv.innerHTML = "Kon prijzen niet laden";
      console.error("HTTP fout:", res.status);
      return;
    }

    const data = await res.json();
    console.log("GELADEN DATA:", data);

    if (!data.stations || data.stations.length === 0) {
      resultDiv.innerHTML = "Geen stations gevonden";
      return;
    }

    // Eenvoudige filter: voor nu negeren we postcode, gewoon goedkoopste
    const goedkoopste = data.stations.sort((a,b) => a.prijs - b.prijs)[0];

    resultDiv.innerHTML = `
      <strong>${goedkoopste.naam}</strong> — €${goedkoopste.prijs.toFixed(2)}<br>
      Locatie: ${goedkoopste.locatie}
    `;

  } catch (err) {
    console.error("Fetch error:", err);
    resultDiv.innerHTML = "Er is een fout opgetreden bij het laden van de data";
  }
}
</script>
