name: Brandstofprijzen bijwerken
 
on:
  schedule:
    - cron: "0 6 * * *"  # Elke dag om 06:00 's ochtends
  workflow_dispatch:       # Ook handmatig te starten
 
jobs:
  scrape:
    runs-on: ubuntu-latest
 
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
 
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Pakketten installeren
        run: pip install requests beautifulsoup4
 
      - name: Scraper uitvoeren
        run: python scraper.py
 
      - name: Prijzen opslaan in repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop || true
          git add prijzen.json
          git diff --staged --quiet || git commit -m "Prijzen bijgewerkt $(date +'%Y-%m-%d')"
          git push
 
