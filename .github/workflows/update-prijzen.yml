name: Tankstations bijwerken
 
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 ochtend
    - cron: "0 12 * * *"  # 12:00 middag
    - cron: "0 18 * * *"  # 18:00 avond
  workflow_dispatch:
 
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
 
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Pakketten installeren
        run: pip install requests beautifulsoup4
 
      - name: Tankstations ophalen
        run: python haal_tankstations_op.py
 
      - name: Opslaan in repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tankstations.json
          git diff --staged --quiet || git commit -m "Tankstations bijgewerkt $(date +'%Y-%m-%d %H:%M')"
          git push
